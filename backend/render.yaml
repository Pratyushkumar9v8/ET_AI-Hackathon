services:
  - type: web
    name: sentinel-backend
    env: python
    buildCommand: "pip install -r requirements.txt && pip install email-validator"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
